name: Weekly TikTok Intelligence Report

on:
  schedule:
    # Every Monday at 01:00 UTC (08:00 WIB)
    - cron: "0 1 * * 1"
  workflow_dispatch: {}   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Scrape TikTok data via Apify
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python src/scrape.py

      - name: Analyze metrics
        run: python src/analyze.py

      - name: Generate AI insights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/insights.py

      - name: Build HTML report
        run: python src/report.py

      - name: Commit and push report to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update weekly TikTok intelligence report [skip ci]"
          git push
