name: Pemetaan Ekosistem TikTok

on:
  workflow_dispatch:
    inputs:
      subject:
        description: "Topik/niche yang akan dipetakan (contoh: skincare)"
        required: true
        type: string
      max_accounts:
        description: "Jumlah maksimum akun yang diproses"
        required: true
        type: choice
        options:
          - "10"
          - "20"
          - "30"
        default: "20"

permissions:
  contents: write

jobs:
  run-ecosystem:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run ecosystem mapping
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python src/ecosystem.py \
            --subject "${{ github.event.inputs.subject }}" \
            --max_accounts "${{ github.event.inputs.max_accounts }}"

      - name: Commit and push ecosystem report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ecosystem.html
          git diff --staged --quiet || git commit -m "chore: ecosystem mapping — subject=${{ github.event.inputs.subject }} [skip ci]"
          git push
