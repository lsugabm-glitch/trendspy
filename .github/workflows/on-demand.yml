name: On-Demand TikTok Research

on:
  workflow_dispatch:
    inputs:
      brief:
        description: "Research brief — describe what you want to know (Bahasa Indonesia or English, 1-3 sentences)"
        required: true
        type: string
      period_days:
        description: "Time window (days) — leave blank to let the planner decide"
        required: false
        type: choice
        options:
          - ""
          - "7"
          - "14"
          - "30"
        default: ""
      max_videos:
        description: "Max videos per query — leave blank to let the planner decide"
        required: false
        type: choice
        options:
          - ""
          - "100"
          - "200"
          - "300"
        default: ""
      dry_run:
        description: "Dry run — only generate the plan, don't scrape"
        required: false
        type: boolean
        default: false

jobs:
  research:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate scraping plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEF: ${{ inputs.brief }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.period_days }}" ]; then
            ARGS="$ARGS --period_days ${{ inputs.period_days }}"
          fi
          if [ -n "${{ inputs.max_videos }}" ]; then
            ARGS="$ARGS --max_videos ${{ inputs.max_videos }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry_run"
          fi
          python src/plan.py $ARGS

      - name: Scrape TikTok
        if: ${{ inputs.dry_run == false }}
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python src/scrape.py --from_plan

      - name: Analyze
        if: ${{ inputs.dry_run == false }}
        run: python src/analyze.py --slug on_demand

      - name: Generate insights
        if: ${{ inputs.dry_run == false }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/insights.py --from_plan

      - name: Build report
        if: ${{ inputs.dry_run == false }}
        run: python src/report.py --slug on_demand

      - name: Commit report
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Report: ${{ inputs.brief }}"
          git push
