name: 🔍 On-Demand TikTok Research

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Keyword, #hashtag, atau @profile"
        required: true
        type: string
      mode:
        description: "Tipe query"
        required: true
        default: keyword
        type: choice
        options:
          - keyword
          - hashtag
          - profile
      qualifier:
        description: "Konteks tambahan untuk filter hasil (opsional — contoh: Gojek founder)"
        required: false
        default: ""
        type: string
      period_days:
        description: "Rentang waktu"
        required: false
        default: "7"
        type: choice
        options:
          - "7"
          - "14"
          - "30"
      max_videos:
        description: "Maks video yang di-scrape"
        required: false
        default: "200"
        type: choice
        options:
          - "100"
          - "200"
          - "300"
          - "500"

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape TikTok
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python src/scrape.py \
            --query "${{ github.event.inputs.query }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --period_days "${{ github.event.inputs.period_days }}" \
            --max_videos "${{ github.event.inputs.max_videos }}"

      - name: Analyze
        run: |
          python src/analyze.py \
            --qualifier "${{ github.event.inputs.qualifier }}"

      - name: Generate insights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/insights.py

      - name: Render report
        run: |
          python src/report.py \
            --query "${{ github.event.inputs.query }}" \
            --qualifier "${{ github.event.inputs.qualifier }}"

      - name: Commit results
        run: |
          git config user.name "trendspy-bot"
          git config user.email "actions@trendspy"
          git add reports/ docs/
          git diff --staged --quiet || \
            git commit -m "on-demand: ${{ github.event.inputs.query }} ($(date +'%Y-%m-%d'))"
          git push
